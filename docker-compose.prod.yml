services:
  plant-care:
    build:
      context: .
      network: host
    container_name: plant-care
    restart: unless-stopped
    ports:
      - "127.0.0.1:3020:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://plant:${PLANT_DB_PASSWORD:-plant_secret}@plant-postgres:5432/plant_care
    env_file:
      - .env.production
    depends_on:
      plant-postgres:
        condition: service_healthy
    volumes:
      - plant-uploads:/app/uploads
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - claude-code-nas_claude-network

  plant-postgres:
    image: postgres:18-alpine
    container_name: plant-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: plant
      POSTGRES_PASSWORD: ${PLANT_DB_PASSWORD:-plant_secret}
      POSTGRES_DB: plant_care
    volumes:
      - plant-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plant -d plant_care"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  plant-pgdata:
  plant-uploads:

networks:
  claude-code-nas_claude-network:
    external: true
